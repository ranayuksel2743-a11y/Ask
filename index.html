<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Belilyon'a ve Ranbilyon'a ait.</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#fff5e1,#ffd6e0);
text-align:center;
}

/* GİRİŞ */
#giris{margin-top:120px;}
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* KUTU */
.kutu{
background:white;
margin:20px auto;
padding:20px;
border-radius:20px;
width:90%;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SAYAÇ */
#sayac{
font-size:22px;
color:#ff4d88;
font-weight:bold;
}

/* ZARF */
.envelope{
width:300px;
margin:auto;
cursor:pointer;
}
.env-body{
background:white;
border-radius:10px;
height:220px;
position:relative;
overflow:hidden;
}
.env-flap{
position:absolute;
width:100%;
height:100%;
background:white;
clip-path:polygon(0 0,100% 0,50% 55%);
transition:0.6s;
transform-origin:top;
}
.letter{
position:absolute;
bottom:-150px;
left:5%;
width:90%;
background:#ffe4e1;
padding:15px;
border-radius:10px;
transition:0.6s;
color:#0b1a4a;
text-align:left;
}
.envelope.open .env-flap{
transform:rotateX(180deg);
}
.envelope.open .letter{
bottom:10px;
}

/* OYUN */
.board{
display:grid;
grid-template-columns:repeat(8,1fr);
gap:4px;
width:320px;
margin:auto;
}
.cell{
background:#eee;
aspect-ratio:1;
position:relative;
border-radius:6px;
cursor:pointer;
}
.cell img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* BUTON */
button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#ff6b81;
color:white;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<!-- GİRİŞ -->
<div id="giris">
<h2>Şifre</h2>
<input type="password" id="sifre" onkeydown="if(event.key==='Enter') kontrol()">
<br><br>
<button onclick="kontrol()">Giriş</button>
</div>

<!-- SİTE -->
<div id="site" style="display:none;">

<h1>Bizim Hikayemiz ❤️‍🩹</h1>

<!-- SAYAÇ -->
<div class="kutu">
<h2>Kaç gün beraber büyüdük :)</h2>
<div id="sayac"></div>
</div>

<!-- ZARF -->
<div class="kutu">
<h2>Mektup</h2>
<div class="envelope" onclick="toggleEnvelope()">
<div class="env-body">
<div class="env-flap"></div>
<div class="letter">
Hayatımın Elzemine,<br><br>
Bitanem öncelikle iyi ki varsın.<br><br>
Bugün senin kutladığımız ilk doğum günün.<br><br>
İçimdeki eksik yanımın en güzel tamamlayıcı parçasısın.<br><br>
Seni çok seviyorum 💙
</div>
</div>
</div>
</div>

<!-- OYUN -->
<div class="kutu">
<h2>Oyun</h2>
<p>Tıkla ve fotoğrafları aç</p>
<div class="board" id="board"></div>
</div>

</div>

<script>

// ŞİFRE
function kontrol(){
if(sifre.value==="0537"){
giris.style.display="none";
site.style.display="block";
}else alert("Yanlış şifre balım");
}

// SAYAÇ
let baslangic=new Date("2025-07-11");
function sayac(){
let now=new Date();
let gun=Math.floor((now-baslangic)/(1000*60*60*24));
document.getElementById("sayac").innerText=gun+" ❤️‍🩹";
}
setInterval(sayac,1000);
sayac();

// ZARF
function toggleEnvelope(){
document.querySelector(".envelope").classList.toggle("open");
}

// OYUN
let boardEl=document.getElementById("board");
let photo=1;

for(let i=0;i<64;i++){
let cell=document.createElement("div");
cell.className="cell";

cell.onclick=()=>{
if(cell.innerHTML===""){
if(photo<=11){
let img=document.createElement("img");
img.src="Biz/Foto"+photo+".jpeg";
cell.appendChild(img);
photo++;
}
}

if(photo>11){
setTimeout(()=>{
document.body.innerHTML="<h1 style='margin-top:40vh'>İyi ki varsın 💙</h1>";
},500);
}
};

boardEl.appendChild(cell);
}

</script>

</body>
</html>
