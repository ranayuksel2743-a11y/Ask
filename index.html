<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İçinde yaşattığın küçüğüm'e</title>

<style>
body {
    margin: 0;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Zarf */
.envelope {
    position: relative;
    width: 320px;
    height: 220px;
    background: #1e3a8a;
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.5s;
}

/* Üst kapak */
.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-top: 110px solid #1e3a8a;
    z-index: 2;
}

/* Kalp */
.heart {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    z-index: 3;
}

/* Mektup */
.letter {
    position: absolute;
    bottom: -220px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: 180px;
    background: white;
    border-radius: 10px;
    padding: 15px;
    font-size: 14px;
    line-height: 1.5;
    overflow-y: auto;
    transition: 0.6s;
    z-index: 1;
}

/* Açılınca */
.envelope.open .letter {
    bottom: 20px;
}

/* Yazı */
#text {
    color: #1e3a8a;
}

/* Yanıp sönen imleç */
#text::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0;}
    100% {opacity: 1;}
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter(this)">
    <div class="heart">❤️</div>

    <div class="letter">
        <p id="text"></p>
    </div>
</div>

<script>
const message = `Hayatımın Elzemine,
                Bitanem öncelikle iyi ki varsın.
                Bugün senin kutladığımız ilk doğum günün.
                Yıllar sonra benim olmak için doğduğun bu dünyayı benim için eşsiz kılacak kişisin sen.
                Elzemim,
                İçimde ki varoluştan gelen eksik yanımın en güzel tamamlayıcı parçasısın sen.
                Her sene beraber senin yeniden doğuşunla benim seninle yaşamamı kutlayacağız. 
                Seni çok seviyorum iyi ki doğdun, iyi ki benim oldun.
                

let i = 0;
let started = false;
const speed = 40;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

function openLetter(el) {
    el.classList.toggle("open");

    if (!started) {
        typeWriter();
        started = true;
    }
}
</script>

</body>
